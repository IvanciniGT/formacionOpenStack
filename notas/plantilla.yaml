# Listas ordenadas: Guion delante de cada item de la lista.. 
# Después del sguion, al menos un espacio en blanco.
# Puedo tener datos de disnto tipo en la lista
# Pensad en una estructura jerárquica.. como carpetas en windows.
- Item 1
-               2
-     true
-
  - subitem 1
  - subitem 2
  - 3
-
  - subitem 1
  - subitem 2
  - 3
    # Aquí al menos un espacio sangrado con respecto al anterior nivel.
    # Lo único que exige YAML es que el sangrado sea uniforme en cada nivel
# Hay una sintaxis alternativa:
---
[ Item1, 2, true, [subitem1, subitem2, 3], [subitem1, subitem2, 3] ] 
---
[item1, 2, true] # Esta sintaxis no se usa. No está recomendada.
# Está solo por 2 motivos:
# - Para poder poner listas vacias
---
[]
--- 
# Para compatibilidad con JSON:
[item1, 2, TRUE]
# ["item1", 2, true] # Esto es JSON... y también es YAML.
# Cualquier documento JSON, puede ser tratado como YAML (casi casi...)
---
- item 1
- 2
- true
---
# Diccionarios | Mapas desordenados: Clave: Valor | Arrays Asociativos 
# Pares clave / valor
clave1: valor1
clave2: 33
clave3: true
clave4:
              - item1
              - item2
clave5:
  subclave1:            valor1
  subclave2: valor2
# ESTE ES EL TIPO DE DOCUMENTO MAS HABITUAL EN YAML.
---
# Sintaxis alternativa:
{ clave1: valor1, clave2: 33, clave3: true, clave4: [item1, item2], clave5: { subclave1: valor1, subclave2: valor2 } }
# Esa sintaxis no se recomienda, pero es compatible con JSON.
---
# Si hace falta para un caso de uso: Mapa vacío:
{}  
---
# Los mapas son desordenados:
clave1: valor1
clave2: valor2
clave3: valor3
---
clave3: valor3
clave1: valor1
clave2: valor2
# Se consideran identicos.
