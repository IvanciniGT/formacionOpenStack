# Observaciones
# Cuando uso estos archivos es MUY IMPORTANTE usan 
# un buen editor de texto.
# Los espacios y las tabulaciones no son lo mismo... aunque visualmente puedan parecerlo.
# Quizás use un editor que me represente los tabs como 4 espacios...
# Y tengo 2 lineas, una con un tab y otra con 4 espacios... visualmente parecen iguales, pero no lo son.
# YAML ME DA ERROR. No me da error por usar tabs. Sino porque esas 2 cosas tendrían sangrados diferentes.
# Un buen edito, reemplaza los tabs con espacios, para evitar problemas.
