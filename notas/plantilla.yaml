
# Puedo poner comentarios. Aleluya! Cosa que por ejemplo en JSON no está permitida
# En un fichero YAML puedo tener muchos documentos YAML.
# En JSON, un fichero JSON = un documento JSON.
# En XML, un fichero XML = un documento XML.
# En un fichero .properties, un fichero .properties = un documento .properties.
# En YAML, un fichero YAML = 1 o más documentos YAML.
# Cada documento empieza con ---, menos el primero que se le pone eso.

---
# Un documento YAML Es un NODO.
# Y hay 2 tipos: Escalares y De colección
# - Escalares: Valores simples: números, cadenas de texto, booleanos, nulos.
# - De colección: Listas ordenadas y Mapas desordenados.

