---
# YAML llegha hasta aquí.  Nos da una sinatxis BASICA.
# Cada programa que usa YAML define lo que se llama un ESQUEMA.
# Ese esquema define la estructura que debe tener un documento YAML para ese programa concreto.
# Por ejemplo, el archivo clouds.yaml de OpenStack, tiene un esquema concreto:
clouds:
  mi_nube:
    auth:
      auth_url: http://localhost:5000/v3
      username: admin
      password: admin
      project_name: admin
---